events {}

http {
  server {
    listen 80;
    server_name heyvarchas.duckdns.org;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name heyvarchas.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/heyvarchas.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heyvarchas.duckdns.org/privkey.pem;

    location /api/ {
      proxy_pass http://backend:3000;
    }

    location / {
      proxy_pass http://frontend:80;
    }
  }
}